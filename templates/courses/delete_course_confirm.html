{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <h3>Delete Course</h3>
    <p>Are you sure you want to delete "{{ course.title }}"?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            Yes Delete
        </button>

        <a href="{% url 'all_platform_courses' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
